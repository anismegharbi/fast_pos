services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voila_pos}
      POSTGRES_USER: ${POSTGRES_USER:-voila}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voila}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
